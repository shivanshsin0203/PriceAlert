# BOOTSTRAP config — used ONLY until the first certificate is issued (DEPLOY.md step 5).
# Serves the ACME challenge over plain HTTP so certbot can prove domain ownership.
# Replace API_DOMAIN with your real hostname (e.g. api.pricealert.xyz).

server {
    listen 80;
    server_name API_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 404; # nothing else is served until TLS exists
    }
}

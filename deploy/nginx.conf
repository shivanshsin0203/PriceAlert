# Production config (after the first cert exists). Replace API_DOMAIN everywhere
# with your real hostname (e.g. api.pricealert.xyz).
# TLS terminates here; Express sees X-Forwarded-* (app.set("trust proxy", 1)).

server {
    listen 80;
    server_name API_DOMAIN;

    # certbot renewals keep using the webroot over HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name API_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/API_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/API_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Telegram webhook payloads and BFF calls are small — keep limits tight
    client_max_body_size 1m;

    location / {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
